<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Game Screen -->
  <div class="game-container" id="gameScreen">
    <h1>Tic Tac Toe</h1>
    <div id="board" class="board">
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
    </div>
    <p id="status">Player X's turn</p>
  </div>

  <!-- Result Screen -->
  <div class="result-container" id="resultScreen">
    <h1 id="resultText"></h1>
    <button onclick="newGame()">New Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
